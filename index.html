<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clan Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="card auth-card">
        <p class="eyebrow">Clan Zugang</p>
        <h1>Willkommen beim Daily Riddle</h1>
        <p class="intro">
          Gib deinen Namen und das Clan-Passwort ein. Zusätzlich legst du dein eigenes Zugangspasswort fest, das du beim nächsten Login wieder eingeben musst. So können mehrere Personen demselben Clan beitreten.
        </p>

        <form id="login-form" class="form">
          <label class="field">
            <span>Name</span>
            <input id="name" name="name" type="text" placeholder="Dein Name" required />
          </label>

          <label class="field">
            <span>Clan-Passwort</span>
            <input id="password" name="password" type="password" placeholder="Clan Passwort" required />
          </label>

          <label class="field">
            <span>Eigenes Zugangspasswort</span>
            <input id="personal-password" name="personalPassword" type="password" placeholder="Eigenes Passwort" required />
          </label>

          <button type="submit" class="button">Clan betreten</button>
          <p id="login-message" class="message" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase.js"></script>
    <script src="script.js"></script>
  </body>
</html>
