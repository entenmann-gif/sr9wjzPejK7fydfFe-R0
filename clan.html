<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dein Clan</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="clan-page">
      <section class="card clan-card">
        <a class="back-link" href="dashboard.html">← Zurück zum Dashboard</a>
        <p class="eyebrow">Clan Übersicht</p>
        <h1 id="clan-title"></h1>
        <p class="intro">Hier siehst du alle Personen aus deinem Clan und ihre aktuellen Punkte.</p>
        <p id="clan-message" class="message" aria-live="polite"></p>

        <div class="clan-overview">
          <div class="clan-summary">
            <span>Mitglieder</span>
            <strong id="clan-members-count"></strong>
          </div>
        </div>

        <ul id="clan-members-list" class="clan-members-list"></ul>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="clan.js"></script>
  </body>
</html>
